name: Build and Push to ECR and Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ backend, frontend ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # First build and load the image into the local Docker daemon
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: temp-${{ matrix.service }}:latest

      # Push to Docker Hub with its own tag
      - name: Push to Docker Hub
        run: |
          docker tag temp-${{ matrix.service }}:latest ${{ secrets.DOCKER_USERNAME }}/two-service-${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/two-service-${{ matrix.service }}:latest

      # Push to Amazon ECR with its own tag
      - name: Push to Amazon ECR
        run: |
          docker tag temp-${{ matrix.service }}:latest ${{ steps.login-ecr.outputs.registry }}/two-service-${{ matrix.service }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/two-service-${{ matrix.service }}:latest